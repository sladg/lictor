# lictor policy — project file: ./lictor.toml or ./.claude/lictor.toml
# user file: ~/.config/lictor/config.toml (lists concatenate, deny beats allow)

[settings]
# action when bash can't be statically analyzed (parse error, eval "$X", $CMD ...)
# allow | ask | deny  (default: ask — fail closed)
on_unparseable = "ask"
# structural obfuscation (invisible/zero-width chars, undecodable $'\x..' escapes,
# fork bombs). writes to raw devices (> /dev/sda) are always denied.
on_obfuscation = "deny"
# a command prefixed by a code-injecting env var (LD_PRELOAD, LESSOPEN, PERL5OPT,
# GIT_SSH_COMMAND, ...) — GTFOBins "E" vectors. default deny.
on_dangerous_env = "deny"
# trim absolute/bin executable paths to basenames to save tokens:
#   /usr/local/bin/rg -> rg,  ./node_modules/.bin/tsc -> tsc
# rewrite | warn | ask | deny. Local scripts (./deploy.sh) are left alone.
strip_program_paths = "rewrite"
# action for opaque interpreter payloads: python -c, node -e, perl -e, deno eval,
# and interpreters/shells reading stdin or heredocs (curl x | sh, python <<EOF)
on_inline_script = "ask"

# audit JSONL: every decision, action="log" match, and minify byte delta.
# `lictor gain` summarizes it. Omit to disable logging.
log_file = "~/.local/state/lictor/audit.jsonl"

# context guard: when Bash output exceeds spill_lines, the full output is stored
# via `kv set lictor-<slug>-<ts>` and the model sees only the last spill_keep lines
# plus a `kv get` retrieval note. Runs after minify rules, applies to ALL commands.
spill_lines = 800
spill_keep = 40
spill_expires = "24h"   # forwarded to `kv set --expires-after`
# spill_command = "kv"  # override the storage CLI

# project jail: literal paths outside the project (and allowed roots) -> warn | ask | deny.
# project root = the git repo containing cwd, so the agent moves freely inside the repo.
jail = "ask"
jail_allow = ["~/Downloads"]

# rogue-actor guard: N consecutive denies with nothing executed in between ->
# every Bash call asks until one actually runs
strikes = 5

# dynamic modules: context-aware checks backed by read-only probes (git ls-files,
# PATH resolve, session state). Each accepts a subset of off|warn|rewrite|ask|deny|allow.
[modules]
git-mv = "rewrite"          # mv of a git-tracked path -> git mv (keeps history)
git-rm = "rewrite"          # rm of a git-tracked path -> git rm (records the deletion)
delete-recreate = "ask"     # a Write resembling a just-deleted file -> rename it properly
self-rm = "allow"           # rm of files the agent itself created this session -> no prompt
pm-cwd = "rewrite"          # cd pkg && bun run x -> bun --cwd pkg run x
abs-paths = "warn"          # absolute path to an in-project file -> use the relative one
path-check = "warn"         # program guaranteed not to resolve on PATH -> tell the agent why

# ---- bash rules: matched against EVERY command in a chain, after unwrapping
# sudo/env/xargs/nohup/timeout/..., bash -c "...", eval '...', $(...), subshells,
# git global flags (git -C x commit == git commit), /usr/bin/git == git

[[bash]]
match = "git commit*"
action = "deny"
reason = "Commits are manual — propose a commit message and wait for the user."

[[bash]]
match = "git stash*"
action = "deny"
reason = "Never stash — ask the user how to handle dirty state."

[[bash]]
match = "git push*"
action = "ask"

[[bash]]
match = "grep*"
action = "rewrite"
rewrite = "rg"
hint = "grep is banned here; the command was rewritten to ripgrep."

[[bash]]
match = "git status*"
action = "allow"    # auto-approve, skips the permission prompt

# catalogs: named command groups configured as one block. Built-ins ship in the
# binary (shell-core, fs-read, text-read, git-read, kubectl-read, net-egress,
# mutating, pkg-install, secrets-read, destructive, obfuscation, noisy-build, ...)
# and bundles activate curated sets: recommended | read-only | paranoid.
# Add `catalogs = ["recommended"]` under [settings] for safe defaults in one line.

# mention-to-activate a built-in, optionally overriding its action:
[catalog.kubectl-read]
action = "allow"

# tweak a built-in's membership:
[catalog.git-read]
action = "allow"
add = ["git submodule status"]
remove = ["git grep"]

# custom group; one block gates AND minifies (unified):
[catalog.prod-surface]
match = ["terraform apply", "flyctl deploy", "kubectl * -n prod*"]
action = "ask"
reason = "Production surface — confirm."

# `contains` globs match any argument AFTER the program, order-independent —
# for banning specific flags while a broader allow/ask rule covers the base command
[[bash]]
match = "git push"
contains = ["--force", "-f"]
action = "deny"
reason = "Force pushes are banned."

# projects define their own scripts; never run tsc via package runners
[[bash]]
match = "bunx tsc*"
action = "deny"
reason = "Use the project script: bun run typecheck."

[[bash]]
match = "npx tsc*"
action = "deny"
reason = "Use the project script instead of npx tsc."

# strict arg allowlist: `only` forbids any argument not matching a glob
# (extra URLs, -o file, ...); flags pass via "-*". For URL/domain policy
# proper, prefer the [[web]] rules below.
[[bash]]
match = "curl"
only = ["-*", "https://internal.example/*"]
action = "allow"

# ---- web rules: URL policy for static http(s) URLs in Bash args AND the
# WebFetch tool (add WebFetch to the PreToolUse matcher — `lictor init` shows it).
# `domains` globs test the host ("*." does NOT cover the apex — list both),
# `match` globs test the URL path. deny > ask > rewrite > warn > allow, so the
# extension denylist beats any domain allow. A command auto-approves only when
# every URL matches an allow rule and every word is static — a $VAR, a mixed
# unknown URL, or an output redirect drops it back to the bash rules.

[[web]]
domains = ["docs.rs", "github.com", "*.github.com"]
action = "allow"

[[web]]
match = ["*.zip", "*.tar.gz", "*.tgz", "*.sh", "*.dmg", "*.pkg"]
action = "deny"
reason = "no downloading archives or scripts"

# WebFetch only: reroute Cloudflare-walled pages through a markdown proxy like
# PullMD (github.com/AeternaLabsHQ/pullmd) — {url} expands to the original URL
[[web]]
domains = ["*.medium.com"]
action = "rewrite"
rewrite = "https://pullmd.example/api?url={url}"

# ---- agent rules: regex over subagent (Task tool) traffic.
# on = "prompt" gates before launch (deny/ask/warn); on = "output" attaches a
# hint next to the result (the work already happened — warn/log only).

[[agent]]
pattern = "(?i)comprehensive analysis|deep dive"
on = "output"
action = "warn"
hint = "subagent output smells like filler — ask for specifics"

# audit without deciding: rule-log entries land in settings.log_file
[[bash]]
match = "gh *"
action = "log"

# toolchain activation guidance: on a "command not found" failure with the
# marker file in cwd, lictor tells the agent to activate and retry.
# (Hooks can't silently re-run a failed command, so this is guidance, not magic.)
[[activate]]
file = ".prototools"
run = "proto use"
tools = ["node", "npm", "npx", "pnpm", "yarn", "bun", "bunx", "tsc", "uv"]

[[activate]]
file = ".nvmrc"
run = "nvm use"
tools = ["node", "npm", "npx", "yarn"]

# ---- edit rules: path globs + content regexes (Edit/Write/MultiEdit/NotebookEdit)
# pattern          — fires when written content MATCHES (gate what's added)
# removed_pattern  — fires when old content matched but new doesn't (gate deletions;
#                    Write sends no prior content, so it never fires there)
# required_pattern — fires when written content is MISSING the regex (demand boilerplate)
# all specified conditions must hold for the rule to fire

[[edit]]
paths = ["**/*.ts", "**/*.tsx"]
pattern = "as (any|never|unknown)"
action = "deny"
hint = "No type assertions — fix the type design instead."

# deletions: doc-comments must survive refactors. retry_count/retry_window on a
# warn = deliver the hint N times inside the window, then go quiet (on a deny
# rule the same pair means: deny N times, then allow the identical resubmission)
[[edit]]
paths = ["**/*.ts", "**/*.tsx"]
removed_pattern = '(?s)/\*\*.*?\*/'
action = "warn"
hint = "A doc-comment was removed by this edit — keep it unless asked."
retry_count = 2
retry_window = 300

# required content: every edit to a doc must carry the updated_at bump
[[edit]]
paths = ["docs/**/*.md"]
required_pattern = '(?m)^updated_at: \d{4}-\d{2}-\d{2}'
action = "deny"
hint = "Bump `updated_at:` in the frontmatter as part of this edit."

[[edit]]
paths = ["**/.env*"]
action = "ask"
hint = "Touching environment files."

# ---- path rules: dir globs -> action + your own hint, matched against every
# filesystem path a command touches — Bash args (cd-aware), NAME=val / export
# assignment values, write-redirect targets (echo x > /tmp/y), and Write/Edit
# file paths. First matching rule wins, so a specific `allow` can carve an
# exception out of a broad `deny`. Each glob is tested against both the lexical
# and the symlink-resolved path (one /tmp/** covers macOS's /private/tmp too).
# This is where temp/scratch/secrets policy lives — no default ships.

[[path]]
match = ["/private/tmp/claude-501/**"]   # this session's scratchpad is fine
action = "allow"

[[path]]
match = ["/tmp/**", "/private/tmp/**"]    # everything else in temp is not
action = "deny"
hint = "scratch goes in .claude/scratch/ or `kv set`, never /tmp"

[[path]]
match = ["~/.ssh/**", "~/.aws/**"]
action = "ask"
hint = "touching credentials — confirm intent"

# ---- minify rules
# wrap: rtk-style — rewrite the command to run under a token-efficient proxy
# pipe: squeez-style — filter captured stdout through any stdin->stdout program
# max_lines: built-in head/tail truncation, no external tool needed

[[minify]]
match = "git log*"
wrap = "rtk"
allow = true        # wrapped command is also auto-approved

[[minify]]
match = "npm install*"
pipe = "tail -20"

[[minify]]
match = "vitest*"
max_lines = 80

# ---- per-mode policy (permission_mode: default | plan | acceptEdits | auto |
# dontAsk | bypassPermissions). Three tools, least to most sweeping:
#   1. per-rule `modes` map — one shared pattern, mode-specific action
#   2. [modes.<mode>] overlay — extra rules/settings only in that mode
#   3. [modes.<mode>.remap] — rewrite the FINAL decision, applied last
# Dry-run: `lictor check --mode auto -- <cmd>`.

# 1. shared rule, per-mode action (works on bash/edit/path/web/agent + catalogs):
[[bash]]
match = "cargo test*"
action = "allow"
modes = { plan = "deny" }     # no test runs while planning

[catalog.mutating]
modes = { plan = "deny" }     # no mutations while planning; unchanged elsewhere

# 2. overlay: settings override, rule lists append, most-restrictive wins
[modes.auto.settings]
jail = "deny"                 # unattended: hard-confine to the repo

[modes.bypassPermissions.settings]
jail = "deny"

[[modes.bypassPermissions.bash]]
match = "curl*"
action = "deny"               # net-egress asks elsewhere; unattended mode can't ask
reason = "no unattended network access"

# 3. remap: nobody answers a dialog in auto mode — every final `ask` becomes
# `deny`; `warn = "skip"` would drop hints too
[modes.auto.remap]
ask = "deny"

# allowlist lockdown: default_bash/default_edit/default_web decide when NO rule
# matched — plan mode reads anything, writes only markdown, researches only
# vetted domains
[modes.plan.settings]
default_bash = "deny"
default_edit = "deny"
default_web = "deny"

[[modes.plan.edit]]
paths = ["**/*.md"]
action = "allow"

# if the harness ever renames a permission mode, map the new name to the one
# this file uses (keys = harness name, single hop) — no lictor update needed:
# [settings]
# mode_aliases = { unattended = "auto" }
