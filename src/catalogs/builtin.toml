# Built-in catalogs — inert until referenced from user config
# ([catalog.<name>] block or settings.catalogs bundle). Patterns are the same
# word-globs as [[bash]] match; `rules` entries add contains/only constraints.

# shell builtins/coreutils that loops and scripts lean on; without these,
# `for f in *; do wc -l $f; done` could never be auto-approved
[catalog.shell-core]
action = "allow"
match = ["echo", "printf", "read", "cd", "pushd", "popd", "true", "false", "test", "[", ":", "seq", "sleep", "wait", "command -v"]

[catalog.fs-read]
action = "allow"
match = ["ls", "tree", "eza", "stat", "file", "du", "df", "realpath", "readlink", "basename", "dirname", "pwd", "which", "type"]

[catalog.text-read]
action = "allow"
match = ["cat", "head", "tail", "nl", "less", "more", "strings", "od", "xxd", "grep", "rg", "sort", "uniq", "cut", "tr", "diff", "cmp", "wc", "jq", "yq", "sed"]

# all kv-cache operations; pairs with settings.spill_command — lictor itself tells
# the agent to retrieve spilled output via `kv get <key>` (and CLAUDE.md-style
# workflows pipe straight into `kv set`), so gating any of get/set/list/delete
# just trades one prompt for another on lictor's own recommended workflow. It's
# a disposable local cache, not a source of truth — low blast radius either way.
[catalog.kv-cache]
action = "allow"
match = ["kv"]

# nudge toward `rg` for content search / file discovery; warn-only, grants no permission —
# grep and sed(non -i) stay allowed via text-read, find stays ask (no catalog covers it)
[catalog.search-nudge]
action = "warn"
hint = "lictor: prefer `rg` (content search) / `rg --files` (file discovery) over grep/find/sed — respects .gitignore, faster, one tool for both jobs"
match = ["grep", "find", "sed"]

[catalog.sysinfo]
action = "allow"
match = ["uname", "arch", "nproc", "uptime", "free", "lscpu", "lsblk", "printenv", "locale", "date", "whoami", "id", "groups", "hostname", "sw_vers"]

[catalog.proc-read]
action = "allow"
match = ["ps", "pgrep", "pstree", "pmap", "lsof"]

[catalog.net-query]
action = "allow"
match = ["dig", "host", "nslookup", "ss", "ping", "traceroute", "mtr", "whois", "getent"]

[catalog.git-read]
action = "allow"
match = [
  "git status", "git log", "git diff", "git show", "git blame", "git shortlog",
  "git describe", "git rev-parse", "git ls-files", "git ls-remote", "git reflog",
  "git cat-file", "git grep", "git worktree list", "git stash list",
  "git branch --list", "git branch -a", "git branch -r", "git branch -v",
  "git remote -v", "git tag --list", "git config --get", "git config --list",
  "git submodule status", "git config get", "git config list",
]

[catalog.gh-read]
action = "allow"
match = [
  "gh pr list", "gh pr view", "gh pr checks", "gh pr status", "gh pr diff",
  "gh issue list", "gh issue view", "gh run list", "gh run view", "gh run watch",
  "gh repo view", "gh release list", "gh release view", "gh auth status",
  "gh search", "gh label list",
]

[catalog.docker-read]
action = "allow"
match = ["docker ps", "docker images", "docker inspect", "docker logs", "docker stats --no-stream", "docker top", "docker history", "docker version", "docker info", "docker diff", "docker volume ls", "docker network ls", "docker search", "docker port"]

[catalog.kubectl-read]
action = "allow"
match = [
  "kubectl get", "kubectl describe", "kubectl logs", "kubectl top", "kubectl explain",
  "kubectl api-resources", "kubectl api-versions", "kubectl version", "kubectl cluster-info",
  "kubectl config view", "kubectl config get-contexts", "kubectl config current-context",
  "kubectl auth can-i", "kubectl diff", "kubectl events", "kubectl wait",
]

[catalog.helm-read]
action = "allow"
match = ["helm list", "helm status", "helm get", "helm show", "helm history", "helm search", "helm template", "helm lint", "helm version"]

[catalog.tf-read]
action = "allow"
match = ["terraform validate", "terraform fmt -check", "terraform show", "terraform output", "terraform state list", "terraform version", "terraform providers", "terraform graph", "terraform workspace list", "terraform workspace show"]

[catalog.svc-read]
action = "allow"
match = ["systemctl status", "systemctl list-units", "systemctl list-timers", "systemctl is-active", "systemctl is-enabled", "systemctl show", "systemctl cat", "journalctl", "launchctl list", "launchctl print"]

[catalog.pkg-query]
action = "allow"
match = [
  "npm ls", "npm list", "npm outdated", "npm view", "npm search",
  "pnpm list", "pnpm outdated", "bun pm ls", "yarn list",
  "pip list", "pip show", "pip freeze", "uv pip list",
  "cargo tree", "cargo metadata", "cargo search",
  "brew list", "brew info", "brew outdated", "brew search",
  "apt list", "apt show", "apt search", "dpkg -l", "rpm -qa", "gem list",
]

[catalog.net-egress]
action = "ask"
reason = "Outbound network access."
match = ["curl", "wget", "http", "https", "nc", "ncat", "telnet"]

[catalog.mutating]
action = "ask"
reason = "Filesystem mutation."
match = ["rm", "mv", "cp", "ln", "mkdir", "rmdir", "touch", "chmod", "chown", "tee", "truncate"]
# sed is a text-read reader by default; -i turns it into an in-place edit, which
# should ask like any other mutation (and not silently ride text-read's allow)
[[catalog.mutating.rules]]
match = ["sed"]
contains = ["-i*"]

[catalog.pkg-install]
action = "ask"
reason = "Package install/upgrade."
match = [
  "npm install", "npm i", "npm add", "npm uninstall", "npm update",
  "pnpm install", "pnpm add", "yarn add", "bun install", "bun add",
  "pip install", "pip uninstall", "uv pip install", "uv add",
  "cargo install", "cargo add", "cargo remove",
  "brew install", "brew uninstall", "brew upgrade",
  "apt install", "apt-get install", "gem install",
]

[catalog.secrets-read]
action = "deny"
reason = "Reading secret material is banned."
[[catalog.secrets-read.rules]]
match = ["cat", "less", "more", "head", "tail", "bat", "strings", "od", "xxd", "grep", "rg", "sed"]
contains = ["*.env*", "*.pem", "*.key", "*id_rsa*", "*id_ed25519*", "*id_ecdsa*", "*.aws/credentials*", "*.ssh/*", "*.npmrc", "*.netrc", "*.kube/config*"]

[catalog.destructive]
action = "deny"
reason = "Destructive command."
match = ["shred", "mkfs*", "fdisk", "parted", "wipefs", "blkdiscard"]
[[catalog.destructive.rules]]
match = ["dd"]
contains = ["of=/dev/*"]
[[catalog.destructive.rules]]
match = ["rm"]
# literal root-level targets only — an escaped \* so it matches the exact
# argument "/*"/"~/*" (shell's own unexpanded root-glob), not "*" as lictor's
# own wildcard, which would otherwise catch every absolute/home path (e.g. a
# jail_allow'd scratch dir) as "destructive"
contains = ["/", "/\\*", "~", "~/\\*", "--no-preserve-root"]
[[catalog.destructive.rules]]
match = ["git push"]
contains = ["--force", "-f"]
[[catalog.destructive.rules]]
match = ["psql", "mysql", "mariadb", "sqlite3", "mongosh", "clickhouse-client"]
contains = ["*DROP DATABASE*", "*DROP TABLE*", "*TRUNCATE TABLE*", "*drop database*", "*drop table*"]

# structural detector (invisible chars, undecodable escapes), not a pattern list;
# `action` here sets settings.on_obfuscation
[catalog.obfuscation]
action = "deny"

# GTFOBins inline-argv (vector type "I") shell/command escapes: payload lives in a
# flag value or a program mini-language, invisible to first-word matching.
# (env-var "E" vectors are handled by on_dangerous_env; interactive "T" by the
# `interactive` catalog; file-drop "D" by pkg-install/git-commit gating.)
[catalog.gtfobins]
action = "deny"
reason = "GTFOBins shell-escape vector."
# tar: --checkpoint-action=exec, --to-command, -I/--use-compress-program, --rsh-command
[[catalog.gtfobins.rules]]
match = ["tar"]
contains = ["--checkpoint-action*", "--to-command*", "--use-compress-program*", "-I*", "--rsh-command*"]
# awk family: system()/exec()/network extension inside the program
[[catalog.gtfobins.rules]]
match = ["awk", "gawk", "mawk", "nawk"]
contains = ["*system(*", "*exec(*", "*/inet/*"]
# sed: the `e` execute command (1e cmd, s///e)
[[catalog.gtfobins.rules]]
match = ["sed"]
contains = ["*e exec*", "1e*", "*/e", "e"]
# git config/exec-path injection (on the un-normalized variant)
[[catalog.gtfobins.rules]]
match = ["git"]
contains = ["*core.pager=*", "*core.editor=*", "*core.sshCommand=*", "*core.fsmonitor=*", "*core.hooksPath=*", "*sequence.editor=*", "*.pager=*", "--exec-path=*"]
[[catalog.gtfobins.rules]]
match = ["git rebase"]
contains = ["-x*", "--exec*"]
# ssh/scp/rsync remote-command injection
[[catalog.gtfobins.rules]]
match = ["ssh", "scp"]
contains = ["*ProxyCommand*", "*LocalCommand*", "-S*"]
[[catalog.gtfobins.rules]]
match = ["rsync"]
contains = ["-e*", "--rsh*", "--rsync-path*"]
# sqlite3 dot-commands
[[catalog.gtfobins.rules]]
match = ["sqlite3"]
contains = [".shell*", ".system*", ".import*", ".load*", ".output*", ".once*", "-cmd*"]
# mysql shell-escape
[[catalog.gtfobins.rules]]
match = ["mysql", "mariadb"]
contains = ["*! /*", "\\!*"]
# build tooling
[[catalog.gtfobins.rules]]
match = ["make"]
contains = ["--eval*"]
[[catalog.gtfobins.rules]]
match = ["gcc", "cc", "clang"]
contains = ["-wrapper*"]
[[catalog.gtfobins.rules]]
match = ["gdb"]
contains = ["-ex*", "--eval-command*"]
# apt Pre-Invoke hook
[[catalog.gtfobins.rules]]
match = ["apt-get", "apt"]
contains = ["*Pre-Invoke*", "*Post-Invoke*"]
# editors with script/command flags
[[catalog.gtfobins.rules]]
match = ["vi", "vim", "view", "ex", "nvim"]
contains = ["-c*", "+*", "--cmd*"]
# npm exec, gem/pip editor-open
[[catalog.gtfobins.rules]]
match = ["npm exec"]
contains = ["*"]
[[catalog.gtfobins.rules]]
match = ["gem open", "pip config"]
contains = ["-e*", "--editor*"]
# tcpdump post-rotate command
[[catalog.gtfobins.rules]]
match = ["tcpdump"]
contains = ["-z", "-Z"]
# docker container escape
[[catalog.gtfobins.rules]]
match = ["docker run", "docker container run"]
contains = ["--privileged", "/:*", "/:/*"]

# interactive binaries that can spawn a shell via a typed escape (GTFOBins "T");
# argv looks benign so we can only gate by identity — ask before running them
[catalog.interactive]
action = "ask"
reason = "Interactive program can spawn a shell via a typed escape (GTFOBins)."
match = ["less", "more", "man", "nano", "pico", "vi", "vim", "view", "nvim", "ftp", "sftp", "gdb", "expect", "ed"]

# minify-only: no gate action, activates output truncation for builds
[catalog.noisy-build]
max_lines = 120
match = [
  "cargo build", "cargo test", "cargo check", "cargo clippy",
  "npm run build", "npm test", "pnpm run build", "pnpm test",
  "go build", "go test", "vitest", "tsc", "make",
]
